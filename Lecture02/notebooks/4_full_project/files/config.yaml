# ─────────────────────────────────────────────
#  MNIST Classifier — Experiment Configuration
# ─────────────────────────────────────────────
# All hyperparameters live here.
# Change values here without touching any code.

seed: 42

data:
  data_dir: ./data
  batch_size: 64
  num_workers: 2
  val_split: 0.1

model:
  input_size: 784
  hidden_size: 256
  num_classes: 10
  dropout: 0.3
  lr: 0.001

trainer:
  max_epochs: 20
  accelerator: auto
  gradient_clip_val: 1.0
  deterministic: true
  log_every_n_steps: 10

callbacks:
  early_stopping:
    monitor: val_loss
    patience: 5
    mode: min
  checkpoint:
    monitor: val_acc
    mode: max
    save_top_k: 1
  lr_monitor:
    logging_interval: epoch

logger:
  save_dir: logs/
  name: mnist_classifier
